<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dokku Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 28px;
    }

    .logout-btn {
      background: rgba(255, 255, 255, 0.3);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.5);
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .app-card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .app-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .app-name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #333;
    }

    .app-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-running {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status-stopped {
      background: #ffebee;
      color: #c62828;
    }

    .status-unknown,
    .status-error {
      background: #fff3e0;
      color: #e65100;
    }

    .app-url {
      font-size: 13px;
      color: #666;
      word-break: break-all;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }

    .app-url a {
      color: #667eea;
      text-decoration: none;
    }

    .app-url a:hover {
      text-decoration: underline;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .refresh-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }

    .refresh-btn:hover {
      background: #764ba2;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <h1>🚀 Projects</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="container">
    <div style="margin-bottom: 20px;">
      <button class="refresh-btn" onclick="loadApps()">⟳ Refresh</button>
    </div>
    <div id="apps-container" class="loading">Loading projects...</div>
  </div>

  <script>
    async function loadApps() {
      const container = document.getElementById('apps-container');
      container.innerHTML = '<div class="loading">Loading projects...</div>';

      try {
        const response = await fetch('/api/apps');
        const apps = await response.json();

        if (apps.length === 0) {
          container.innerHTML = '<div class="empty">No projects deployed yet</div>';
          return;
        }

        const html = apps.map(app => `
          <div class="app-card">
            <div class="app-name">${escapeHtml(app.name)}</div>
            <div class="app-status">
              <span class="status-badge status-${app.status}">${app.status}</span>
            </div>
            <div class="app-url">
              <a href="${escapeHtml(app.url)}" target="_blank">${escapeHtml(app.url)}</a>
            </div>
          </div>
        `).join('');

        container.innerHTML = `<div class="apps-grid">${html}</div>`;
      } catch (err) {
        container.innerHTML = '<div class="empty">Error loading projects</div>';
        console.error(err);
      }
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    async function logout() {
      await fetch('/logout', { method: 'POST' });
      window.location.href = '/login';
    }

    // Load apps on page load and set up auto-refresh
    loadApps();
    setInterval(loadApps, 30000); // Refresh every 30 seconds
  </script>
</body>
</html>
