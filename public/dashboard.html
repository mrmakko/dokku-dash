<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dokku Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="header">
    <div class="header-content">
      <h1>Projects</h1>
      <div class="header-controls">
        <span id="refresh-status" class="refresh-status refresh-status-idle" role="status" aria-live="polite" hidden></span>
        <button id="refresh-button" class="btn" onclick="loadApps()">Refresh</button>
        <button class="btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="apps-container" class="loading">Loading projects...</div>
  </div>

  <script src="/dashboard.js"></script>
</body>
</html>
